<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Chiron — exact-or-refuse evidence gate</title>
  <desc id="desc">A dark product card showing Chiron checking a machine claim: one verified claim, one refuted claim, and a bounded public evaluation result.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#081017"/>
      <stop offset="1" stop-color="#132638"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4e7bff" stop-opacity=".32"/>
      <stop offset="1" stop-color="#55d6af" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000" flood-opacity=".28"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1050" cy="-30" r="420" fill="url(#glow)"/>
  <path d="M0 530C210 448 396 640 660 525C889 425 1015 473 1200 398V630H0Z" fill="#071018" opacity=".55"/>
  <text x="78" y="90" fill="#dce7ff" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" letter-spacing="6">CHIRON</text>
  <circle cx="206" cy="82" r="6" fill="#70a2ff"/>
  <text x="78" y="145" fill="#80a6ff" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" letter-spacing="2">EXACT-OR-REFUSE EVIDENCE GATE</text>
  <text x="78" y="213" fill="#f5f8ff" font-family="Arial, Helvetica, sans-serif" font-size="56" font-weight="700">Make AI outputs</text>
  <text x="78" y="271" fill="#f5f8ff" font-family="Arial, Helvetica, sans-serif" font-size="56" font-weight="700">earn trust.</text>
  <text x="78" y="320" fill="#afbdd2" font-family="Arial, Helvetica, sans-serif" font-size="23">Supported claims are VERIFIED, REFUTED,</text>
  <text x="78" y="351" fill="#afbdd2" font-family="Arial, Helvetica, sans-serif" font-size="23">or explicitly left uncertified.</text>

  <g filter="url(#shadow)">
    <rect x="740" y="126" width="390" height="338" rx="22" fill="#101b29" stroke="#3b5273" stroke-width="2"/>
    <text x="772" y="169" fill="#92a8c5" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" letter-spacing="1.4">LIVE CLAIM CHECK</text>
    <rect x="772" y="195" width="326" height="70" rx="12" fill="#0b1420" stroke="#29415e"/>
    <text x="794" y="224" fill="#eef5ff" font-family="Arial, Helvetica, sans-serif" font-size="20">97 is prime</text>
    <text x="794" y="249" fill="#59d99a" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" letter-spacing="1">VERIFIED</text>
    <rect x="772" y="280" width="326" height="70" rx="12" fill="#0b1420" stroke="#59404a"/>
    <text x="794" y="309" fill="#eef5ff" font-family="Arial, Helvetica, sans-serif" font-size="20">2 + 2 = 5</text>
    <text x="794" y="334" fill="#ff8f86" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" letter-spacing="1">REFUTED</text>
    <line x1="772" y1="375" x2="1098" y2="375" stroke="#2d405a"/>
    <text x="772" y="406" fill="#aec0d8" font-family="Arial, Helvetica, sans-serif" font-size="16">Coverage shown. Remainder stays uncertified.</text>
    <text x="772" y="436" fill="#76a1ff" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700">CHECK THE PUBLIC PROOF →</text>
  </g>

  <line x1="78" y1="500" x2="1122" y2="500" stroke="#31465d"/>
  <text x="78" y="548" fill="#8ca6c7" font-family="Arial, Helvetica, sans-serif" font-size="17">CURRENT FROZEN EXTERNAL EVAL</text>
  <text x="78" y="586" fill="#f1f6ff" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="700">22 stamped  /  22 externally correct  /  0 false stamps  /  12 refusals</text>
  <text x="1045" y="548" fill="#70a2ff" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" text-anchor="end">chiron</text>
</svg>
